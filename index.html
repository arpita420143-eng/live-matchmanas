<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MKS Study System - Royal Edition</title>
    
    <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool@latest'></script>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ROYAL NAVY & GOLD PREMIUM THEME --- */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap');
        
        :root { 
            --bg-deep: #0B132B;       /* Dark Navy Blue */
            --bg-card: #1C2541;       /* Lighter Navy */
            --gold-light: #FBEA9D;
            --gold-main: #D4AF37;     /* Royal Gold */
            --gold-dark: #AA8222;
            --btn-blue: #235789;
            --btn-red: #C1292E;
            --text-main: #FFFFFF;
        }
        
        body { margin: 0; padding: 0; background: var(--bg-deep); color: var(--text-main); font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; min-height: 100vh; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* HEADER */
        .header { background: rgba(11, 19, 43, 0.95); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold-main); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        
        .logo-container { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo-text { font-size: 22px; font-weight: 900; background: linear-gradient(to right, var(--gold-light), var(--gold-main), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .logo-sub { font-size: 10px; color: #aaa; font-weight: 600; letter-spacing: 2px; display: block; margin-top: -4px; text-transform: uppercase; }
        
        .head-btns { display: flex; gap: 10px; }
        .h-btn { padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; text-decoration: none; color: white; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .hb-tg { background: linear-gradient(135deg, #1cb5e0, #000046); } 
        .hb-yt { background: linear-gradient(135deg, #cb2d3e, #ef473a); }
        .h-btn:active { transform: scale(0.95); }

        /* MAIN CONTAINER */
        .main-container { padding: 20px 15px; width: 100%; max-width: 700px; margin: 0 auto; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; }
        
        /* VIDEO CARD (GOLD BORDER) */
        .video-card { background: var(--bg-card); border: 2px solid var(--gold-main); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px rgba(212, 175, 55, 0.2); }
        .video-wrapper { position: relative; width: 100%; background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; }
        
        #shaka-container { width: 100%; height: 100%; position: relative; }
        video { width: 100%; height: 100%; display: block; object-fit: contain; }
        #iframe-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        
        /* BADGES ON VIDEO */
        .top-badges { position: absolute; top: 15px; left: 15px; z-index: 25; display: flex; gap: 10px; pointer-events: none; }
        .badge-live { background: rgba(0,0,0,0.7); border: 1px solid #ff4d4d; color: #ff4d4d; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 6px; backdrop-filter: blur(5px); }
        .live-dot { width: 6px; height: 6px; background: #ff4d4d; border-radius: 50%; animation: blink 1s infinite; box-shadow: 0 0 8px #ff4d4d; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .badge-viewers { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--gold-main); color: var(--gold-main); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 6px; backdrop-filter: blur(5px); }

        /* --- QUALITY BUTTON SETTINGS --- */
        .settings-btn { position: absolute; top: 15px; right: 15px; z-index: 20; background: rgba(11, 19, 43, 0.8); color: var(--gold-main); border: 1px solid var(--gold-main); width: 35px; height: 35px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); display: none; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #quality-menu { position: absolute; top: 55px; right: 15px; z-index: 30; background: var(--bg-card); border-radius: 8px; width: 120px; display: none; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.8); border: 1px solid var(--gold-main); }
        .q-item { padding: 10px 15px; font-size: 13px; font-weight: 600; color: #ccc; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .q-item:hover { background: rgba(212, 175, 55, 0.1); }
        .q-item.active { background: var(--gold-main); color: #000; font-weight: 800; }

        /* ACTION BUTTONS */
        .controls-box { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .btn-gold { background: linear-gradient(to right, var(--gold-dark), var(--gold-light), var(--gold-main)); color: #000; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4); text-shadow: 0 1px 2px rgba(255,255,255,0.5); cursor: pointer; }
        .btn-gold:active { transform: translateY(2px); box-shadow: 0 2px 10px rgba(212, 175, 55, 0.4); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-btn { padding: 14px; border-radius: 10px; color: white; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
        .btn-tg-large { background: linear-gradient(to bottom, #235789, #133353); }
        .btn-yt-large { background: linear-gradient(to bottom, #C1292E, #7A191C); }

        /* ADMIN PANEL CARDS */
        #admin-panel { display: none; margin-top: 10px; }
        .secret-title { font-size: 14px; font-weight: 800; margin-bottom: 15px; color: var(--gold-main); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        #secret-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .channel-card { background: var(--bg-card); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .channel-card i { font-size: 28px; color: #888; transition: 0.3s; }
        .channel-name { font-weight: 700; font-size: 13px; color: #ccc; transition: 0.3s; }
        
        .channel-card.active { border: 2px solid var(--gold-main); background: rgba(212, 175, 55, 0.1); transform: translateY(-5px); box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2); }
        .channel-card.active i { color: var(--gold-main); text-shadow: 0 0 10px var(--gold-main); }
        .channel-card.active .channel-name { color: var(--gold-main); }

        .site-footer { text-align: center; padding: 20px 15px; color: #666; font-size: 12px; margin-top: auto; }
        
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 45px; height: 45px; border: 4px solid rgba(212, 175, 55, 0.2); border-top: 4px solid var(--gold-main); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; z-index: 30; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .shaka-current-time, .shaka-text-container { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container" id="_0xSecLogo">
            <div>
                <div class="logo-text">MKS STUDY</div>
                <div class="logo-sub">SYSTEM</div>
            </div>
        </div>
        <div class="head-btns">
            <a href="https://t.me/MKSSports_3" class="h-btn hb-tg" target="_blank"><i class="fab fa-telegram-plane"></i> Join</a>
            <a href="https://youtube.com/@mkssports3" class="h-btn hb-yt" target="_blank"><i class="fab fa-youtube"></i> Sub</a>
        </div>
    </div>

    <div class="main-container">
        
        <div class="video-card">
            <div class="video-wrapper" id="videoWrapper">
                <div class="top-badges">
                    <div class="badge-live"><span class="live-dot"></span> LIVE</div>
                    <div class="badge-viewers"><i class="fas fa-users"></i> <span id="fake-viewers">1177</span> VIEWERS</div>
                </div>
                
                <button id="settings-btn" class="settings-btn" onclick="toggleQualityMenu()"><i class="fas fa-cog"></i></button>
                <div id="quality-menu"><div id="quality-list"></div></div>
                
                <div id="shaka-container" data-shaka-player-container>
                    <video id="video" data-shaka-player autoplay playsinline></video>
                </div>
                <div id="iframe-box"></div>
                <div id="loader"></div>
            </div>
            
            <div class="controls-box">
                <a href="javascript:location.reload();" class="btn-gold">
                    <i class="fas fa-sync"></i> FIX LAG / REFRESH STREAM
                </a>
                
                <div class="btn-grid">
                    <a href="https://t.me/MKSSports_3" class="action-btn btn-tg-large" target="_blank">
                        <i class="fab fa-telegram-plane"></i> Telegram
                    </a>
                    <a href="https://youtube.com/@mkssports3" class="action-btn btn-yt-large" target="_blank">
                        <i class="fab fa-youtube"></i> Subscribe
                    </a>
                </div>
            </div>
        </div>
        
        <div id="admin-panel">
            <div class="secret-title"><i class="fas fa-tv"></i> Select Channel To Play</div>
            <div id="secret-grid"></div>
        </div>
        
    </div>

    <div class="site-footer">
        © 2026 MKS STUDY SYSTEM — Made with <span style="color: #ff4d4d;">❤️</span>.<br>
        I am not the owner of any channels or content displayed. If you wish content removed, contact us and we will respond promptly.
    </div>
        <script>
        // Security Protections
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74||e.keyCode==67))||(e.ctrlKey&&e.keyCode==85)) return !1; };

        // Fake viewers logic
        let vCount = 1177;
        setInterval(() => {
            vCount += Math.floor(Math.random() * 15) - 5;
            document.getElementById('fake-viewers').innerText = vCount;
        }, 4000);

        // Channel Data (All 4 Channels included)
        const channels = [
            { id: "c1", name: "Willow HD", icon: "fas fa-baseball-ball", url: "https://amg01269-amg01269c1-sportstribal-emea-5204.playouts.now.amagi.tv/ts-eu-w1-n2/playlist/amg01269-willowtvfast-willowplus-sportstribalemea/playlist.m3u8", type: "hls" },
            { id: "c2", name: "TEN Cricket", icon: "fas fa-tv", url: "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/cllekigzzn/out/v1/bd3b0c314fff4bb1ab4693358f3cd2d3/cenc.mpd", type: "dash", keys: { "294b5761cefc22d0c6312939e13d8278": "52148f1042d238849f0a7813f1da8a7b" } },
            { id: "c3", name: "Star Allrounder", icon: "fas fa-star", url: "https://allrounder-live2.pages.dev/star/star-1-hindi", isIframe: true },
            { id: "c4", name: "Star Sports Hindi", icon: "fas fa-play-circle", url: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd?__hdnea__=st=1777797642~exp=1777819242~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=9ec9e5ea8b9a2cb03b1e5ae3649b4bf50a34aaf10636983e1c19cc0870e47dcf", type: "dash", keys: { "400131994b445d8c8817202248760fda": "2d56cb6f07a75b9aff165d534ae2bfc4" } }
        ];

        let hls = null, shakaPlayerInstance = null, shakaUI = null, clickCount = 0;

        // 5-Click Admin Logic
        let clickTimer;
        document.getElementById('_0xSecLogo').addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 2500);
            
            if (clickCount === 5) {
                clickCount = 0;
                const pwd = prompt("Enter Admin Password:");
                if (pwd === "manas") {
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('admin-panel').scrollIntoView({behavior: "smooth"});
                }
            }
        });

        // Advanced Jio Fetcher
        async function fetchJioToken() {
            try {
                const listRes = await fetch("https://raw.githubusercontent.com/Shubhamkur/Tv/refs/heads/main/Cookies");
                const urlArray = await listRes.json();
                const response = await fetch(urlArray[0]);
                const rawText = await response.text();
                const match = rawText.match(/(__hdnea__=[^"'\s&|]+)/);
                return match ? match[1] : "";
            } catch (error) { return ""; }
        }

        // --- QUALITY MENU LOGIC ---
        function toggleQualityMenu() {
            const menu = document.getElementById('quality-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function buildQualityMenu() {
            if (!hls) return;
            const list = document.getElementById('quality-list'); list.innerHTML = "";
            let autoBtn = document.createElement('div'); autoBtn.className = 'q-item active'; autoBtn.innerText = 'Auto';
            autoBtn.onclick = () => {
                hls.currentLevel = -1; toggleQualityMenu();
                document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active')); autoBtn.classList.add('active');
            };
            list.appendChild(autoBtn);

            hls.levels.forEach((level, index) => {
                let btn = document.createElement('div'); btn.className = 'q-item'; btn.innerText = level.height + 'p';
                btn.onclick = () => {
                    hls.currentLevel = index; toggleQualityMenu();
                    document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active')); btn.classList.add('active');
                };
                list.appendChild(btn);
            });
        }

        // Build Royal UI Menu & Auto-Play
        function initMenu() {
            const grid = document.getElementById('secret-grid');
            channels.forEach(ch => {
                const card = document.createElement('div');
                card.id = 'card-' + ch.id;
                card.className = 'channel-card';
                card.innerHTML = `<i class="${ch.icon}"></i><div class="channel-name">${ch.name}</div>`;
                card.onclick = () => loadPlayer(ch);
                grid.appendChild(card);
            });

            const urlParams = new URLSearchParams(window.location.search);
            const reqId = urlParams.get('id');
            if(reqId) {
                const autoCh = channels.find(c => c.id === reqId);
                if(autoCh) {
                    setTimeout(() => loadPlayer(autoCh), 1000);
                }
            }
        }

        // The Player Integrator
        async function loadPlayer(ch) {
            const video = document.getElementById('video');
            const shakaContainer = document.getElementById('shaka-container');
            const iframeBox = document.getElementById('iframe-box');
            const loader = document.getElementById('loader');
            const settingsBtn = document.getElementById('settings-btn');
            
            // Highlight active card
            document.querySelectorAll('.channel-card').forEach(b => b.classList.remove('active'));
            const activeCard = document.getElementById('card-' + ch.id);
            if(activeCard) activeCard.classList.add('active');

            loader.style.display = 'block';
            document.getElementById('quality-menu').style.display = 'none';
            settingsBtn.style.display = 'none'; 

            if(hls) { hls.destroy(); hls = null; }
            if(shakaUI) { shakaUI.destroy(); shakaUI = null; }
            if(shakaPlayerInstance) { shakaPlayerInstance.destroy(); shakaPlayerInstance = null; }

            // Handle iFrame
            if (ch.isIframe) {
                shakaContainer.style.display = 'none'; 
                iframeBox.style.display = 'block';
                iframeBox.innerHTML = `<iframe src="${ch.url}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
                setTimeout(() => loader.style.display = 'none', 1500);
            } 
            // Handle DASH (Shaka)
            else if (ch.type === "dash") {
                shakaContainer.style.display = 'block'; 
                iframeBox.style.display = 'none';
                iframeBox.innerHTML = ""; video.controls = false;

                shaka.polyfill.installAll();
                if (shaka.Player.isBrowserSupported()) {
                    shakaPlayerInstance = new shaka.Player(video);
                    shakaUI = new shaka.ui.Overlay(shakaPlayerInstance, shakaContainer, video);
                    
                    shakaUI.configure({
                        'controlPanelElements': ['play_pause', 'spacer', 'mute', 'volume', 'quality', 'fullscreen']
                    });

                    shakaPlayerInstance.configure({
                        drm: ch.keys ? { clearKeys: ch.keys } : {},
                        streaming: { lowLatencyMode: true }
                    });

                    let jioToken = "";
                    if (ch.url.includes('jio.com')) jioToken = await fetchJioToken();

                    shakaPlayerInstance.getNetworkingEngine().registerRequestFilter((type, request) => {
                        if (request.uris[0].includes('jio.com')) {
                            request.headers['Referer'] = 'https://www.jiotv.com/';
                            if (jioToken && (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT)) {
                                request.uris[0] = request.uris[0].split('?')[0] + '?' + jioToken;
                            }
                        }
                    });

                    try {
                        await shakaPlayerInstance.load(ch.url);
                        loader.style.display = 'none';
                        video.play();
                    } catch (e) { loader.style.display = 'none'; }
                }
            } 
            // Handle HLS
            else {
                iframeBox.style.display = 'none'; 
                iframeBox.innerHTML = "";
                shakaContainer.style.display = 'block'; 
                video.controls = true;
                settingsBtn.style.display = 'flex'; 

                if (Hls.isSupported()) {
                    hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { 
                        loader.style.display = 'none'; 
                        video.play();
                        buildQualityMenu(); 
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = ch.url;
                    video.addEventListener('loadedmetadata', () => { loader.style.display = 'none'; video.play(); });
                }
            }
        }

        window.onload = initMenu;
    </script>
</body>
</html>
