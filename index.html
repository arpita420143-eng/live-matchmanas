    <style>
        /* --- PREMIUM DARK THEME --- */
        :root { --bg-main: #0a0b0e; --bg-card: #14161c; --accent-red: #e50914; --accent-blue: #0088cc; --text-main: #ffffff; }
        body { margin: 0; background: var(--bg-main); color: var(--text-main); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; min-height: 100vh; user-select: none; -webkit-user-select: none; }
        
        /* HEADER */
        .header { position: sticky; top: 0; z-index: 100; background: rgba(20, 22, 28, 0.95); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; backdrop-filter: blur(10px); }
        .logo { font-size: 18px; font-weight: 900; color: white; cursor: pointer; text-transform: uppercase; }
        .logo span { color: var(--accent-red); }
        .head-btns { display: flex; gap: 8px; }
        .h-btn { padding: 6px 10px; border-radius: 50px; font-size: 10px; font-weight: 700; text-decoration: none; color: white; display: flex; align-items: center; gap: 5px; }
        .hb-tg { background: var(--accent-blue); } .hb-yt { background: var(--accent-red); }

        /* MAIN CONTAINER */
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0; width: 100%; max-width: 1200px; margin: 0 auto; box-sizing: border-box; }
        
        /* PLAYER BOX */
        .player-box { width: 100%; max-width: 800px; background: var(--bg-card); overflow: hidden; border-bottom: 1px solid #333; margin-top: 0; }
        @media(min-width: 600px) {
            .main-container { padding: 10px; }
            .player-box { border-radius: 12px; border: 1px solid #333; margin-top: 5px; }
        }
        
        /* --- VIDEO WRAPPER --- */
        .video-wrapper { position: relative; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; height: 320px; }
        @media(min-width: 600px) { .video-wrapper { height: 450px; aspect-ratio: 16/9; } }
        
        #shaka-container { width: 100%; height: 100%; position: relative; }
        video { width: 100%; height: 100%; display: block; object-fit: contain; }
        #iframe-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        #iframe-box iframe { width: 100%; height: 100%; border: none; }
        
        /* LIVE BADGE */
        .live-overlay { position: absolute; top: 15px; left: 15px; z-index: 25; background: rgba(0, 0, 0, 0.6); color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 8px; pointer-events: none; }
        .live-dot { width: 8px; height: 8px; background: #e50914; border-radius: 50%; animation: blink 1.2s infinite ease-in-out; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* SETTINGS BTN */
        .settings-btn { position: absolute; top: 10px; right: 10px; z-index: 20; background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 5px 10px; border-radius: 6px; cursor: pointer; backdrop-filter: blur(5px); font-size: 16px; transition: 0.3s; display: none; }
        #quality-menu { position: absolute; top: 45px; right: 10px; z-index: 30; background: rgba(15, 15, 15, 0.95); border: 1px solid #444; border-radius: 8px; width: 140px; display: none; overflow: hidden; }
        .q-item { padding: 10px 12px; font-size: 13px; color: #ddd; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .q-item:hover { background: #333; } .q-item.active { background: var(--accent-red); color: white; font-weight: bold; }
        
        /* CONTROLS & BUTTONS */
        .controls-box { padding: 15px 10px; }
        .prominent-fix-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 15px; margin-bottom: 15px; background: linear-gradient(45deg, #ffb400, #ff8800); color: #000; font-weight: 900; font-size: 16px; border-radius: 12px; text-decoration: none; text-transform: uppercase; animation: glow 2s infinite; text-align: center; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px #ffb400; } 50% { box-shadow: 0 0 20px #ffb400; } }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .action-btn { padding: 12px; border-radius: 8px; color: white; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tg { background: var(--accent-blue); } .yt { background: var(--accent-red); }
        
        /* FOOTER */
        .site-footer { text-align: center; padding: 20px 10px; border-top: 1px solid #222; color: #777; font-size: 11px; background: #0a0b0e; line-height: 1.6; }
        
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid var(--accent-red); border-radius: 50%; animation: spin 1s linear infinite; display: none; z-index: 5; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        let shakaUI = null;
        let activeCh = null;
        let clickCount = 0;
        let viewerCount = Math.floor(Math.random() * 30) + 40; 

        async function fetchJioToken() {
            try {
                const listRes = await fetch("https://raw.githubusercontent.com/Shubhamkur/Tv/refs/heads/main/Cookies");
                const urlArray = await listRes.json();
                const response = await fetch(urlArray[0]);
                const rawText = await response.text();
                const match = rawText.match(/(__hdnea__=[^"'\s&|]+)/);
                return match ? match[1] : "";
            } catch (error) { return ""; }
        }

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            activeCh = channels.find(c => c.id === urlParams.get('id')) || channels[0];
            loadPlayer(activeCh);
            renderSecretMenu();
        }

        function unlockSecret() { 
            clickCount++; 
            if (clickCount === 5) { 
                clickCount = 0; 
                if (prompt("Password:") === "manas") {
                    document.getElementById('secret-menu').style.display = 'block'; 
                }
            } 
        }

        function renderSecretMenu() {
            const grid = document.getElementById('secret-grid');
            grid.innerHTML = "";
            channels.forEach(ch => {
                const btn = document.createElement('div');
                btn.style.cssText = "background: #222; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; color: white; font-size: 12px; border: 1px solid #333;";
                btn.innerText = ch.name;
                btn.onclick = () => { loadPlayer(ch); document.getElementById('secret-menu').style.display = 'none'; };
                grid.appendChild(btn);
            });
        }

        async function loadPlayer(ch) {
            activeCh = ch;
            const video = document.getElementById('video');
            const shakaContainer = document.getElementById('shaka-container');
            const iframeBox = document.getElementById('iframe-box');
            const loader = document.getElementById('loader');
            const wrapper = document.getElementById('videoWrapper');
            const settingsBtn = document.getElementById('settings-btn');
            const qualityMenu = document.getElementById('quality-menu');

            wrapper.style.display = 'flex';
            loader.style.display = 'block';
            qualityMenu.style.display = 'none';
            
            if(hls) { hls.destroy(); hls = null; }
            if(shakaUI) { shakaUI.destroy(); shakaUI = null; }
            if(shakaPlayerInstance) { shakaPlayerInstance.destroy(); shakaPlayerInstance = null; }

            if (ch.isIframe) {
                shakaContainer.style.display = 'none';
                settingsBtn.style.display = 'none';
                iframeBox.style.display = 'block';
                iframeBox.innerHTML = `<iframe src="${ch.url}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" scrolling="no"></iframe>`;
                setTimeout(() => { loader.style.display = 'none'; }, 2000);
            } else if (ch.type === "dash") {
                shakaContainer.style.display = 'block';
                settingsBtn.style.display = 'none'; 
                iframeBox.style.display = 'none';
                iframeBox.innerHTML = "";
                video.controls = false; 

                shaka.polyfill.installAll();
                if (shaka.Player.isBrowserSupported()) {
                    shakaPlayerInstance = new shaka.Player(video);
                    shakaUI = new shaka.ui.Overlay(shakaPlayerInstance, shakaContainer, video);
                    shakaUI.configure({ 'controlPanelElements': ['play_pause', 'spacer', 'mute', 'quality', 'fullscreen'] });

                    shakaPlayerInstance.configure({
                        drm: ch.keys ? { clearKeys: ch.keys } : {},
                        manifest: { defaultPresentationDelay: 5 },
                        streaming: { safeSeekOffset: 5, bufferingGoal: 10, rebufferingGoal: 2, lowLatencyMode: true }
                    });

                    let jioToken = "";
                    if ((ch.url && ch.url.includes('jio.com')) || (ch.urls && ch.urls[0].includes('jio.com'))) {
                        jioToken = await fetchJioToken(); 
                    }

                    shakaPlayerInstance.getNetworkingEngine().registerRequestFilter((type, request) => {
                        if (request.uris[0].includes('jio.com')) {
                            request.headers['Referer'] = 'https://www.jiotv.com/';
                            request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
                            if (jioToken && (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT)) {
                                request.uris[0] = request.uris[0].split('?')[0] + '?' + jioToken;
                            }
                        }
                    });

                    let urlsToTry = ch.urls ? ch.urls : [ch.url];
                    let streamLoaded = false;
                    for (let i = 0; i < urlsToTry.length; i++) {
                        try {
                            await shakaPlayerInstance.load(urlsToTry[i]);
                            loader.style.display = 'none';
                            video.play().catch(() => { video.muted = true; video.play(); });
                            streamLoaded = true;
                            break; 
                        } catch (e) { }
                    }
                    if (!streamLoaded) { loader.style.display = 'none'; }
                }
            } else {
                iframeBox.style.display = 'none';
                iframeBox.innerHTML = "";
                shakaContainer.style.display = 'block';
                video.controls = true; 
                settingsBtn.style.display = 'block';

                if (Hls.isSupported()) {
                    hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { 
                        loader.style.display = 'none'; 
                        video.play().catch(() => { video.muted = true; video.play(); }); 
                        generateQualityOptions(); 
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = ch.url;
                    video.addEventListener('loadedmetadata', function() { loader.style.display = 'none'; video.play(); });
                    settingsBtn.style.display = 'none'; 
                }
            }
        }

        function generateQualityOptions() {
            const list = document.getElementById('quality-list');
            list.innerHTML = '<div class="q-item active" onclick="setQuality(-1)">Auto</div>';
            if(hls && hls.levels.length > 0) {
                hls.levels.forEach((level, index) => { 
                    if (level.height) list.innerHTML += `<div class="q-item" onclick="setQuality(${index})">${level.height}p</div>`; 
                });
            }
        }

        function setQuality(index) { 
            if(hls) { 
                hls.currentLevel = index; 
                document.getElementById('quality-menu').style.display = 'none'; 
                const items = document.querySelectorAll('.q-item');
                items.forEach(item => item.classList.remove('active'));
                items[index + 1].classList.add('active');
            } 
        }

        function toggleQualityMenu() { 
            const menu = document.getElementById('quality-menu'); 
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block'; 
        }

        setInterval(() => {
            let change = Math.floor(Math.random() * 5) - 2; 
            viewerCount += change;
            if (viewerCount > 99) viewerCount = 98;
            if (viewerCount < 15) viewerCount = 15;
            document.getElementById('fake-viewers').innerText = viewerCount;
        }, 4000);
