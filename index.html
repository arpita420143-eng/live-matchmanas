    <style>
        /* Glassmorphism & Animations */
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .glass-btn { background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0)); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .glass-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .active-channel { background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.1)) !important; border: 1px solid rgba(96, 165, 250, 0.5) !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); transform: scale(0.98); }
        
        body { background: #0f172a; background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%); background-attachment: fixed; color: white; font-family: 'Segoe UI', sans-serif; }
        
        .loader { border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* Quality Menu */
        #settings-btn { position: absolute; top: 12px; right: 12px; z-index: 50; background: rgba(0,0,0,0.6); color: #3b82f6; border: 1px solid #3b82f6; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #quality-menu { position: absolute; top: 52px; right: 12px; z-index: 60; background: #0f172a; border-radius: 8px; width: 110px; display: none; border: 1px solid #3b82f6; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .q-item { padding: 10px; font-size: 12px; font-weight: 700; text-align: center; color: #ccc; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .q-item:hover { background: rgba(59, 130, 246, 0.2); }
        .q-item.active { background: #3b82f6; color: #fff; }
        .shaka-current-time { display: none !important; }

<body class="min-h-screen flex flex-col items-center pb-10">

        <div class="glass-panel p-4 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-2">
            <button class="md:w-auto rounded-lg font-bold tracking-wide text-white bg-white/10 hover:bg-white/20 px-4 py-2 transition" onclick="location.reload()">
                <i class="fas fa-sync-alt mr-2"></i>Fix Lag
            </button>
            <div class="flex gap-3 w-full md:w-auto">
                <a href="https://t.me/MKSSports_3" target="_blank" class="flex-1 md:flex-none glass-btn bg-blue-500/20 border-blue-400/30 py-2 px-6 rounded-lg text-center hover:bg-blue-600/40 text-white no-underline">
                    <i class="fab fa-telegram-plane mr-2"></i>Telegram
                </a>
                <a href="https://youtube.com/@mkssports3" target="_blank" class="flex-1 md:flex-none glass-btn bg-red-500/20 border-red-400/30 py-2 px-6 rounded-lg text-center hover:bg-red-600/40 text-white no-underline">
                    <i class="fab fa-youtube mr-2"></i>YouTube

            </div>
        </div>

        <div class="space-y-3">
            <div class="flex items-center justify-between px-1">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Live Channels</h3>
                <span class="text-xs text-gray-500"><i class="fas fa-signal text-green-500 mr-1"></i>Stable</span>
            </div>
            <div id="channel-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                </div>
        </div>

        <div class="glass-panel rounded-2xl overflow-hidden h-[80vh] w-full mt-4">
            <div class="bg-black/50 p-2 text-center text-xs text-gray-400 border-b border-white/10 uppercase tracking-widest">Live Scoreboard</div>
            <embed src="https://we-live-v2.pages.dev/score?tournamentid=17740" class="w-full h-full border-none">
        </div>

    </main>

    <footer class="mt-8 mb-4 text-center text-xs text-gray-500">
        <p>&copy; 2026 MKS STUDY SYSTEM. All Rights Reserved.</p>
    </footer>
        <script>
    (function(){
        // Fake Viewers
        let v = 1238; setInterval(() => { v += Math.floor(Math.random()*10)-4; document.getElementById('v-count').innerText = v; }, 5000);

        // ✅ YOUR PREMIUM CHANNELS DATA
        const CHANNELS = {
            SS1H: { name: "Star 1 Hindi", icon: "fas fa-play-circle", type: "dash", url: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/index.mpd", kid: "400131994b445d8c8817202248760fda", key: "2d56cb6f07a75b9aff165d534ae2bfc4", cookie: "__hdnea__=st=1777815603~exp=1777837203~acl=/bpk-tv/Star_Sports_HD1_Hindi_BTS/WDVLive/*~hmac=a019653f0d0170eca9b371bcd2dacde9582da043ca8f25574ddecb2d3e05878c" },
            SS1E: { name: "Star Sports 1", icon: "fas fa-tv", type: "dash", url: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/WDVLive/index.mpd", kid: "965dc2ddb1d85138ad787999a7f30ca5", key: "859695076e67fe961836b564db6d689c", cookie: "__hdnea__=st=1777815603~exp=1777837203~acl=/bpk-tv/Star_Sports_HD1_BTS/WDVLive/*~hmac=a81447d576ad4642cb96f0d889f102165e53bf3796d5170c594ed604069fccfb" },
            SS2H: { name: "Star 2 Hindi", icon: "fas fa-play-circle", type: "dash", url: "https://jiotvpllive.cdn.jio.com/bpk-tv/StarSportsHD2Hin_BTS/WDVLive/index.mpd", kid: "bd1ea6a1c1fb5dcdb709434e0826bbc0", key: "f57f22cba32739ce7beb1fab3f3d060b", cookie: "__hdnea__=st=1777795787~exp=1777817387~acl=/bpk-tv/StarSportsHD2Hin_BTS/WDVLive/*~hmac=588d4e04984fe51a387af59008192efc06d56a1c3ed5e38f69cd13a42f408698" },
            SS2E: { name: "Star Sports 2", icon: "fas fa-tv", type: "dash", url: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD2_BTS/WDVLive/index.mpd", kid: "9457eb90129456fa8ea95e10ba4ac51e", key: "e620a970cea474c491ac78ae71a4d764", cookie: "__hdnea__=st=1777795787~exp=1777817387~acl=/bpk-tv/Star_Sports_HD2_BTS/WDVLive/*~hmac=a9d76f0b88e517a8f7c035aa4c08808d0cbcf66d35cacb92c2de244da607d6ae" },
            CBH: { name: "Willow Hindi", icon: "fas fa-baseball-ball", type: "hls", url: "https://livevideos.cricbuzz.com/hls/live/2123516/WCB-US-HINDI/9241/152009/master.m3u8?hdntl=exp=1777895597~acl=%2f*~id=qa.team%40cricbuzz.com~data=hdntl,flavour%3aCB,matchId%3a65907,country%3aUS~hmac=b6997764845c66b647d773d5bb011f254e8ec632ae6bc24be538b0c873239776" },
            CBE: { name: "Willow English", icon: "fas fa-baseball-ball", type: "hls", url: "https://livevideos.cricbuzz.com/hls/live/2123398/WCB-CA/9241/152009/master.m3u8?hdntl=exp=1777895597~acl=%2f*~id=qa.team%40cricbuzz.com~data=hdntl,flavour%3aCB,matchId%3a65907,country%3aUS~hmac=b6997764845c66b647d773d5bb011f254e8ec632ae6bc24be538b0c873239776" },
            AMAL: { name: "Willow HD", icon: "fas fa-satellite-dish", type: "hls", url: "https://amg01269-amg01269c1-sportstribal-emea-5204.playouts.now.amagi.tv/ts-eu-w1-n2/playlist/amg01269-willowtvfast-willowplus-sportstribalemea/playlist.m3u8" }
        };

        let player, ui, hls;

        window.toggleQualityMenu = function() {
            const m = document.getElementById('quality-menu');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };

        function buildQualityMenu() {
            if (!hls) return;
            const list = document.getElementById('quality-list'); list.innerHTML = "";
            let autoBtn = document.createElement('div'); autoBtn.className = 'q-item active'; autoBtn.innerText = 'Auto';
            autoBtn.onclick = () => { hls.currentLevel = -1; toggleQualityMenu(); };
            list.appendChild(autoBtn);
            hls.levels.forEach((lvl, idx) => {
                let btn = document.createElement('div'); btn.className = 'q-item'; btn.innerText = lvl.height + 'p';
                btn.onclick = () => { hls.currentLevel = idx; toggleQualityMenu(); };
                list.appendChild(btn);
            });
        }

        async function initPlayer(id) {
            const config = CHANNELS[id];
            const video = document.getElementById("video");
            const container = document.getElementById("player-container");
            const loader = document.getElementById("player-loader");
            const settingsBtn = document.getElementById("settings-btn");

            document.getElementById("player-title").innerText = config.name;
            document.getElementById("current-channel-name-header").innerText = config.name;
            
            loader.style.opacity = "1"; 
            settingsBtn.style.display = "none";
            document.getElementById('quality-menu').style.display = 'none';

            if (hls) { hls.destroy(); hls = null; }
            if (player) { await player.destroy(); player = null; }

            if (config.type === "hls") {
                settingsBtn.style.display = "flex";
                if (Hls.isSupported()) {
                    hls = new Hls(); hls.loadSource(config.url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { loader.style.opacity = "0"; video.play(); buildQualityMenu(); });
                }
            } else {
                shaka.polyfill.installAll();
                player = new shaka.Player();
                await player.attach(video);
                if (!ui) ui = new shaka.ui.Overlay(player, container, video);
                ui.configure({ controlPanelElements: ["mute", "play_pause", "spacer", "quality", "fullscreen"] });
                
                player.configure({
                    drm: { clearKeys: { [config.kid]: config.key } },
                    streaming: { lowLatencyMode: false, bufferingGoal: 15 }
                });

                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    request.headers["Referer"] = "https://www.jiotv.com/";
                    request.headers["User-Agent"] = "plaYtv/7.1.5";
                    request.headers["Cookie"] = config.cookie;
                    const urlCookie = config.cookie.replace("__hdnea__=", "");
                    if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && !request.uris[0].includes("__hdnea__")) {
                        const sep = request.uris[0].includes("?") ? "&" : "?";
                        request.uris[0] += sep + "__hdnea__=" + urlCookie;
                    }
                });

                try { await player.load(config.url); loader.style.opacity = "0"; video.play(); video.muted = false; } catch (e) { console.error(e); }
            }
        }

        window.onload = () => {
            const grid = document.getElementById("channel-grid");
            const params = new URLSearchParams(window.location.search);
            const startId = params.get("id") || "SS1H";

            Object.keys(CHANNELS).forEach(key => {
                const card = document.createElement("div");
                card.className = `glass-btn p-3 rounded-xl flex flex-col items-center gap-2 group cursor-pointer ${key === startId ? 'active-channel' : ''}`;
                card.innerHTML = `<i class="${CHANNELS[key].icon} text-2xl ${key.includes('SS') ? 'text-blue-400' : 'text-green-400'}"></i>
                                  <span class="text-xs font-semibold text-white/90 text-center">${CHANNELS[key].name}</span>`;
                card.onclick = () => {
                    window.history.pushState({}, '', `?id=${key}`);
                    document.querySelectorAll('.glass-btn').forEach(c => c.classList.remove('active-channel'));
                    card.classList.add('active-channel');
                    initPlayer(key);
                };
                grid.appendChild(card);
            });
            initPlayer(startId);
            
            // OneSignal Logic
            window.OneSignalDeferred = window.OneSignalDeferred || [];
            OneSignalDeferred.push(async function(OneSignal) {
                await OneSignal.init({ appId: "4edcb755-e518-46b8-969e-a6a6c679e7b3", safari_web_id: "web.onesignal.auto.34e4584e-b851-4129-9188-f0d7c790d3df" });
                const gate = document.getElementById('floating-lock'), btn = document.getElementById('btn-enable');
                async function check() {
                    const p = await OneSignal.Notifications.permissionNative, s = await OneSignal.User.PushSubscription.optedIn;
                    if (p === 'granted' && s) gate.style.display = 'none';
                }
                check();
                setTimeout(async () => { if(await OneSignal.Notifications.permissionNative === 'default') gate.style.display = 'flex'; }, 8000);
                btn.addEventListener('click', async () => { await OneSignal.Notifications.requestPermission(); check(); });
                OneSignal.Notifications.addEventListener('permissionChange', check);
            });
        };
    })();
    </script>
</body>
