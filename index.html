<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool@latest'></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- PURE PREMIUM DARK THEME (JioCinema / Hotstar Style) --- */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        
        :root { --bg-dark: #000000; --card-bg: #0f1014; --accent: #e50914; --text-main: #ffffff; }
        
        /* Zero padding/margin for Edge-to-Edge display */
        body { margin: 0; padding: 0; background: var(--bg-dark); color: var(--text-main); font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; min-height: 100vh; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* HEADER */
        .header { position: sticky; top: 0; z-index: 100; background: #000; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .logo { font-size: 20px; font-weight: 900; color: white; cursor: pointer; letter-spacing: 0.5px; }
        .logo span { color: var(--accent); }
        
        .head-btns { display: flex; gap: 8px; }
        .h-btn { padding: 8px 14px; border-radius: 4px; font-size: 13px; font-weight: 500; text-decoration: none; color: white; display: flex; align-items: center; gap: 6px; border: 1px solid #333; background: #111; }
        .hb-yt { background: var(--accent); border: none; }
        
        /* PLAYER BOX - FULL WIDTH & BIGGER */
        .main-container { flex: 1; display: flex; flex-direction: column; width: 100%; margin: 0; padding: 0; }
        .player-box { width: 100%; background: #000; border-bottom: 1px solid #1a1a1a; }
        
        /* Force video wrapper to take full width and scale height automatically */
        .video-wrapper { position: relative; width: 100vw; max-width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; aspect-ratio: 16/9; min-height: 230px; }
        
        #shaka-container { width: 100%; height: 100%; position: relative; }
        video { width: 100%; height: 100%; display: block; object-fit: contain; }
        #iframe-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        
        /* HIDE WEIRD TIMESTAMPS FROM SHAKA PLAYER */
        .shaka-current-time { display: none !important; }
        .shaka-text-container { display: none !important; }
        
        /* LIVE BADGE - ADJUSTED FOR BIGGER SCREEN */
        .live-overlay { position: absolute; top: 15px; left: 15px; z-index: 25; background: rgba(229, 9, 20, 0.2); color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; pointer-events: none; border: 1px solid rgba(229, 9, 20, 0.5); backdrop-filter: blur(5px); }
        .live-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* CONTROLS BELOW PLAYER */
        .controls-box { padding: 15px; background: var(--card-bg); width: 100%; box-sizing: border-box; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .action-btn { padding: 14px; border-radius: 6px; color: white; font-weight: 500; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; background: #1a1a1a; border: 1px solid #2a2a2a; }
        .btn-tg { background: #0088cc; border: none; }
        
        /* ADMIN PANEL */
        #admin-panel { display: none; width: 100%; background: var(--card-bg); padding: 20px 15px; border-top: 1px solid #1a1a1a; box-sizing: border-box; }
        .secret-title { font-size: 14px; font-weight: 700; margin-bottom: 15px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        #secret-grid { display: flex; flex-direction: column; gap: 10px; }
        .channel-btn { background: #16181e; color: #ddd; border: 1px solid #222; padding: 16px; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 15px; display: flex; align-items: center; gap: 12px; font-family: inherit; }
        .channel-btn i { font-size: 18px; color: #666; width: 24px; text-align: center; }
        .channel-btn.active { background: rgba(229, 9, 20, 0.1); border-color: var(--accent); color: #fff; }
        .channel-btn.active i { color: var(--accent); }
        
        .site-footer { text-align: center; padding: 25px 15px; color: #555; font-size: 12px; margin-top: auto; }
        
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 45px; height: 45px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; z-index: 30; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" id="_0xSecLogo">MKS <span>STUDY</span></div>
        <div class="head-btns">
            <a href="https://t.me/MKSSports_3" class="h-btn hb-tg" target="_blank"><i class="fab fa-telegram-plane"></i> Join</a>
            <a href="https://youtube.com/@mkssports3" class="h-btn hb-yt" target="_blank"><i class="fab fa-youtube"></i> Sub</a>
        </div>
    </div>

    <div class="main-container">
        <div class="player-box">
            <div class="video-wrapper" id="videoWrapper">
                <div class="live-overlay">
                    <span class="live-dot"></span> LIVE &nbsp;|&nbsp; <i class="fas fa-eye"></i> <span id="fake-viewers">2540</span>
                </div>
                
                <div id="shaka-container" data-shaka-player-container>
                    <video id="video" data-shaka-player autoplay playsinline></video>
                </div>
                
                <div id="iframe-box"></div>
                <div id="loader"></div>
            </div>
            
            <div class="controls-box">
                <div class="btn-grid">
                    <a href="javascript:location.reload();" class="action-btn"><i class="fas fa-sync-alt"></i> Fix Lag</a>
                    <a href="https://t.me/MKSSports_3" class="action-btn btn-tg" target="_blank"><i class="fab fa-telegram-plane"></i> Telegram</a>
                </div>
            </div>
        </div>
        
        <div id="admin-panel">
            <div class="secret-title">Select Stream</div>
            <div id="secret-grid"></div>
        </div>
    </div>
        <script>
        // Security Protections
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74||e.keyCode==67))||(e.ctrlKey&&e.keyCode==85)) return !1; };

        // Channel Data
        const channels = [
            { id: "c1", name: "Willow HD", icon: "fas fa-baseball-ball", url: "https://amg01269-amg01269c1-sportstribal-emea-5204.playouts.now.amagi.tv/ts-eu-w1-n2/playlist/amg01269-willowtvfast-willowplus-sportstribalemea/playlist.m3u8", type: "hls" },
            { id: "c2", name: "TEN Cricket", icon: "fas fa-tv", url: "https://otte.cache.aiv-cdn.net/bom-nitro/live/clients/dash/enc/cllekigzzn/out/v1/bd3b0c314fff4bb1ab4693358f3cd2d3/cenc.mpd", type: "dash", keys: { "294b5761cefc22d0c6312939e13d8278": "52148f1042d238849f0a7813f1da8a7b" } },
            { id: "c3", name: "Star Allrounder", icon: "fas fa-star", url: "https://allrounder-live2.pages.dev/star/star-1-hindi", isIframe: true }
        ];

        let hls = null, shakaPlayerInstance = null, shakaUI = null, clickCount = 0;

        // 5-Click Admin Logic
        let clickTimer;
        document.getElementById('_0xSecLogo').addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 2500);
            
            if (clickCount === 5) {
                clickCount = 0;
                if (prompt("Enter Admin Password:") === "manas") {
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('admin-panel').scrollIntoView({behavior: "smooth"});
                }
            }
        });

        // Advanced Jio Fetcher
        async function fetchJioToken() {
            try {
                const listRes = await fetch("https://raw.githubusercontent.com/Shubhamkur/Tv/refs/heads/main/Cookies");
                const urlArray = await listRes.json();
                const response = await fetch(urlArray[0]);
                const rawText = await response.text();
                const match = rawText.match(/(__hdnea__=[^"'\s&|]+)/);
                return match ? match[1] : "";
            } catch (error) { return ""; }
        }

        // Build UI Menu
        function initMenu() {
            const grid = document.getElementById('secret-grid');
            channels.forEach(ch => {
                const btn = document.createElement('button');
                btn.id = 'btn-' + ch.id;
                btn.className = 'channel-btn';
                btn.innerHTML = `<i class="${ch.icon}"></i> ${ch.name}`;
                btn.onclick = () => loadPlayer(ch);
                grid.appendChild(btn);
            });
        }

        // The Player Integrator
        async function loadPlayer(ch) {
            const video = document.getElementById('video');
            const shakaContainer = document.getElementById('shaka-container');
            const iframeBox = document.getElementById('iframe-box');
            const loader = document.getElementById('loader');
            
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + ch.id).classList.add('active');

            loader.style.display = 'block';

            if(hls) { hls.destroy(); hls = null; }
            if(shakaUI) { shakaUI.destroy(); shakaUI = null; }
            if(shakaPlayerInstance) { shakaPlayerInstance.destroy(); shakaPlayerInstance = null; }

            // Handle iFrame
            if (ch.isIframe) {
                shakaContainer.style.display = 'none'; iframeBox.style.display = 'block';
                iframeBox.innerHTML = `<iframe src="${ch.url}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
                setTimeout(() => loader.style.display = 'none', 1500);
            } 
            // Handle DASH (Shaka)
            else if (ch.type === "dash") {
                shakaContainer.style.display = 'block'; iframeBox.style.display = 'none';
                iframeBox.innerHTML = ""; video.controls = false;

                shaka.polyfill.installAll();
                if (shaka.Player.isBrowserSupported()) {
                    shakaPlayerInstance = new shaka.Player(video);
                    shakaUI = new shaka.ui.Overlay(shakaPlayerInstance, shakaContainer, video);
                    
                    // Fixed the UI to remove the ugly time elements completely
                    shakaUI.configure({
                        'controlPanelElements': ['play_pause', 'spacer', 'mute', 'volume', 'fullscreen']
                    });

                    shakaPlayerInstance.configure({
                        drm: ch.keys ? { clearKeys: ch.keys } : {},
                        streaming: { lowLatencyMode: true }
                    });

                    let jioToken = "";
                    if (ch.url.includes('jio.com')) jioToken = await fetchJioToken();

                    shakaPlayerInstance.getNetworkingEngine().registerRequestFilter((type, request) => {
                        if (request.uris[0].includes('jio.com')) {
                            request.headers['Referer'] = 'https://www.jiotv.com/';
                            if (jioToken && (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT)) {
                                request.uris[0] = request.uris[0].split('?')[0] + '?' + jioToken;
                            }
                        }
                    });

                    try {
                        await shakaPlayerInstance.load(ch.url);
                        loader.style.display = 'none';
                        video.play();
                    } catch (e) { loader.style.display = 'none'; alert("DASH Stream Error"); }
                }
            } 
            // Handle HLS
            else {
                iframeBox.style.display = 'none'; iframeBox.innerHTML = "";
                shakaContainer.style.display = 'block'; video.controls = true;

                if (Hls.isSupported()) {
                    hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { 
                        loader.style.display = 'none'; 
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = ch.url;
                    video.addEventListener('loadedmetadata', () => { loader.style.display = 'none'; video.play(); });
                }
            }
        }

        window.onload = initMenu;
    </script>
</body>
</html>
