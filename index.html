        :root { --bg-main: #0a0b0e; --bg-card: #14161c; --accent-red: #e50914; --accent-blue: #0088cc; --text-main: #ffffff; }

        .player-box { width: 100%; max-width: 800px; background: var(--bg-card); overflow: hidden; border-bottom: 1px solid #333; margin-top: 0; }
        @media(min-width: 600px) {
            .main-container { padding: 10px; }
            .player-box { border-radius: 12px; border: 1px solid #333; margin-top: 5px; }

        /* --- VIDEO WRAPPER --- */
        .video-wrapper { position: relative; width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; height: 320px; }
        @media(min-width: 600px) { .video-wrapper { height: 450px; aspect-ratio: 16/9; } }

        #iframe-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }
        #iframe-box iframe { width: 100%; height: 100%; border: none; }
        
        /* LIVE BADGE */
        .live-overlay { position: absolute; top: 15px; left: 15px; z-index: 25; background: rgba(0, 0, 0, 0.6); color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 8px; pointer-events: none; }

        /* SETTINGS BTN */

        .prominent-fix-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 15px; margin-bottom: 15px; background: linear-gradient(45deg, #ffb400, #ff8800); color: #000; font-weight: 900; font-size: 16px; border-radius: 12px; text-decoration: none; text-transform: uppercase; animation: glow 2s infinite; text-align: center; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px #ffb400; } 50% { box-shadow: 0 0 20px #ffb400; } }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .action-btn { padding: 12px; border-radius: 8px; color: white; font-weight: 700; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; }

        // --- FETCH DYNAMIC JIO TOKEN ---
        async function fetchJioToken() {
            try {
                const listRes = await fetch("https://raw.githubusercontent.com/Shubhamkur/Tv/refs/heads/main/Cookies");

        async function loadPlayer(ch) {
            activeCh = ch;
            const video = document.getElementById('video');
            const shakaContainer = document.getElementById('shaka-container');
            const iframeBox = document.getElementById('iframe-box');
            const loader = document.getElementById('loader');
            const wrapper = document.getElementById('videoWrapper');
            const settingsBtn = document.getElementById('settings-btn');
            const qualityMenu = document.getElementById('quality-menu');

            wrapper.style.display = 'flex';
            loader.style.display = 'block';
            qualityMenu.style.display = 'none';
            
            // Cleanup old players
            if(hls) { hls.destroy(); hls = null; }
            if(shakaUI) { shakaUI.destroy(); shakaUI = null; }
            if(shakaPlayerInstance) { shakaPlayerInstance.destroy(); shakaPlayerInstance = null; }

            if (ch.isIframe) {
                shakaContainer.style.display = 'none';
                settingsBtn.style.display = 'none';
                iframeBox.style.display = 'block';
                iframeBox.innerHTML = `<iframe src="${ch.url}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" scrolling="no"></iframe>`;
                setTimeout(() => { loader.style.display = 'none'; }, 2000);
            
            } else if (ch.type === "dash") {
                // Advanced DRM Player UI
                shakaContainer.style.display = 'block';
                settingsBtn.style.display = 'none'; 
                iframeBox.style.display = 'none';
                iframeBox.innerHTML = "";
                video.controls = false; 

                shaka.polyfill.installAll();
                if (shaka.Player.isBrowserSupported()) {
                    shakaPlayerInstance = new shaka.Player(video);
                    shakaUI = new shaka.ui.Overlay(shakaPlayerInstance, shakaContainer, video);
                    
                    shakaUI.configure({ 'controlPanelElements': ['play_pause', 'spacer', 'mute', 'quality', 'fullscreen'] });

                    // Handle DRM and Synchronization Settings
                    shakaPlayerInstance.configure({
                        drm: ch.keys ? { clearKeys: ch.keys } : {},
                        manifest: { defaultPresentationDelay: 5 },
                        streaming: { safeSeekOffset: 5, bufferingGoal: 10, rebufferingGoal: 2, lowLatencyMode: true }
                    });

                    // Fetch Jio Token if needed
                    let jioToken = "";
                    if ((ch.url && ch.url.includes('jio.com')) || (ch.urls && ch.urls[0].includes('jio.com'))) {
                        jioToken = await fetchJioToken(); 
                    }

                    // Network Filters
                    shakaPlayerInstance.getNetworkingEngine().registerRequestFilter((type, request) => {
                        if (request.uris[0].includes('jio.com')) {
                            request.headers['Referer'] = 'https://www.jiotv.com/';
                            request.headers['User-Agent'] = 'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';
                            
                            if (jioToken && (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT)) {
                                const cleanBaseUrl = request.uris[0].split('?')[0];
                                request.uris[0] = cleanBaseUrl + '?' + jioToken;
                            }
                        }
                    });

                    // Load Logic (Handles ch.url or ch.urls array)
                    let urlsToTry = ch.urls ? ch.urls : [ch.url];
                    let streamLoaded = false;

                    for (let i = 0; i < urlsToTry.length; i++) {
                        try {
                            await shakaPlayerInstance.load(urlsToTry[i]);
                            loader.style.display = 'none';
                            video.play().catch(() => { video.muted = true; video.play(); });
                            streamLoaded = true;
                            break; 
                        } catch (e) {
                            console.warn(`URL ${i+1} Failed, trying next...`, e);
                        }
                    }

                    if (!streamLoaded) {
                        console.error('All URLs blocked or down.');
                        loader.style.display = 'none';
                    }
                }
            
            } else {
                // Normal HLS Logic
                iframeBox.style.display = 'none';
                iframeBox.innerHTML = "";
                shakaContainer.style.display = 'block';
                video.controls = true; 
                settingsBtn.style.display = 'block';

                if (Hls.isSupported()) {
                    hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { 
                        loader.style.display = 'none'; 
                        video.play().catch(() => { video.muted = true; video.play(); }); 
                        generateQualityOptions(); 
                    });
                }
                else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = ch.url;
                    video.addEventListener('loadedmetadata', function() { loader.style.display = 'none'; video.play(); });
                    settingsBtn.style.display = 'none'; 
                }
            }
        }

        function generateQualityOptions() {
            const list = document.getElementById('quality-list');
            list.innerHTML = '<div class="q-item active" onclick="setQuality(-1)">Auto</div>';
            if(hls && hls.levels.length > 0) {
                hls.levels.forEach((level, index) => { 
                    if (level.height) list.innerHTML += `<div class="q-item" onclick="setQuality(${index})">${level.height}p</div>`; 
                });
            }
        }

        function setQuality(index) { 
            if(hls) { 
                hls.currentLevel = index; 
                document.getElementById('quality-menu').style.display = 'none'; 
                const items = document.querySelectorAll('.q-item');
                items.forEach(item => item.classList.remove('active'));
                items[index + 1].classList.add('active');
            } 
        }

        function toggleQualityMenu() { 
            const menu = document.getElementById('quality-menu'); 
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';

            if (viewerCount < 15) viewerCount = 15;
